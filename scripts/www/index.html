					function z_isUrlInWhitelist(url) {
						if (!url || typeof url !== 'string') {
							return false;
						}
						try {
							const urlObj = new URL(url);
							const hostname = urlObj.hostname;
							return Z_CDN_WHITELIST.some(domain => hostname === domain);
						} catch (e) {
							return false;

							return url;
						}
							if (!z_isUrlInWhitelist(url)) {
							return url;
						}
						if (!url.startsWith('https://artifacts-cdn.chatglm.site/')) {
							return 'https://artifacts-cdn.chatglm.site/' + url;
						}
						return url;
					}

					document.addEventListener('click', function (ev) {

							if (!anchor) return;

							let href = anchor.getAttribute('href')?.trim() || '';
							if (!href) return;

							if (href.startsWith('javascript:')) return;

							// 新需求：href="#" 的链接完全阻止跳转和任何行为
							if (href === '#') {
								ev.preventDefault();
								return;
							}

							// 处理其他内部锚点（如 #about、#contact 等）
							if (href.startsWith('#')) {

								if (!rawId) return;

								const id = decodeURIComponent(rawId);
								const target =

									document.querySelector('a[name="' + id.replace(/"/g, '\"') + '"]') ||

								return;
							}

							// 处理外部链接
							let url;

							// 出错时不阻止默认行为
						}

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>色彩大冒险</title>
    <script src="https://artifacts-cdn.chatglm.site/https://cdn.tailwindcss.com"></script>
    <link href="https://artifacts-cdn.chatglm.site/https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&amp;family=Noto+Sans+SC:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://artifacts-cdn.chatglm.site/https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
        tailwind.config={theme:{extend:{fontFamily:{cartoon:['Fredoka','Noto Sans SC','sans-serif'],body:['Noto Sans SC','sans-serif']}}}}
    </script>
    <style>
        :root{--bg:#FFF9F0;--fg:#2D2016;--muted:#9C8B7A;--accent:#FF6B4A;--card:#FFFFFF;--border:#F0E6D8;--success:#22C55E;--error:#EF4444;--yellow:#FFB800;--mint:#2DD4A8}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--fg);overflow-x:hidden;min-height:100vh}
        .bubble{position:fixed;border-radius:50%;opacity:.1;animation:floatUp linear infinite;pointer-events:none;z-index:0}
        @keyframes floatUp{0%{transform:translateY(100vh) rotate(0) scale(.3);opacity:0}8%{opacity:.1}85%{opacity:.1}100%{transform:translateY(-120px) rotate(360deg) scale(1);opacity:0}}
        @keyframes bounceIn{0%{transform:scale(0);opacity:0}50%{transform:scale(1.15)}70%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
        @keyframes bounceSoft{0%{transform:scale(.7) translateY(20px);opacity:0}60%{transform:scale(1.05) translateY(-3px)}100%{transform:scale(1) translateY(0);opacity:1}}
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px) rotate(-2deg)}40%{transform:translateX(8px) rotate(2deg)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
        @keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
        @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
        @keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
        @keyframes titleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        @keyframes mixPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
        @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
        @keyframes confettiFall{0%{transform:translateY(-100px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
        @keyframes starSpin{from{transform:rotate(0) scale(0)}to{transform:rotate(360deg) scale(1)}}
        @keyframes rainbowShift{from{filter:hue-rotate(0)}to{filter:hue-rotate(360deg)}}
        @keyframes correctPulse{0%{transform:scale(1)}40%{transform:scale(1.15)}100%{transform:scale(1.08)}}
        .anim-bounce-in{animation:bounceIn .6s ease-out both}
        .anim-bounce-soft{animation:bounceSoft .5s ease-out both}
        .anim-shake{animation:shake .5s ease-out}
        .anim-pop{animation:pop .3s ease-out}
        .anim-slide-up{animation:slideUp .4s ease-out both}
        .anim-wiggle{animation:wiggle .6s ease-in-out}
        .anim-float{animation:titleFloat 3s ease-in-out infinite}
        .mode-card{opacity:0}
        .mode-card:nth-child(1){animation:bounceSoft .5s .1s ease-out both}
        .mode-card:nth-child(2){animation:bounceSoft .5s .2s ease-out both}
        .mode-card:nth-child(3){animation:bounceSoft .5s .3s ease-out both}
        .mode-card:nth-child(4){animation:bounceSoft .5s .4s ease-out both}
        .mode-card{background:var(--card);border-radius:24px;padding:24px 20px;cursor:pointer;transition:all .4s cubic-bezier(.34,1.56,.64,1);border:3px solid var(--border);position:relative;overflow:hidden}
        .mode-card:hover{transform:translateY(-8px) scale(1.02);box-shadow:0 20px 40px rgba(0,0,0,.1);border-color:transparent}
        .mode-card:active{transform:translateY(-2px) scale(.98)}
        .mode-card:focus-visible{outline:3px solid var(--accent);outline-offset:3px}
        .wheel-ball{transition:all .3s cubic-bezier(.34,1.56,.64,1)}
        .wheel-ball:hover{transform:scale(1.18)!important;z-index:15!important}
        .wheel-ball:active{transform:scale(.95)!important}
        .wheel-ball.selected{transform:scale(1.15)!important;border-color:var(--fg)!important;box-shadow:0 0 0 3px var(--fg),0 4px 14px rgba(0,0,0,.18)!important;z-index:14!important}
        .wheel-ball.correct-ball{border-color:var(--success)!important;box-shadow:0 0 0 3px var(--success),0 0 20px rgba(34,197,94,.35)!important;transform:scale(1.08)!important;animation:correctPulse .5s ease-out both}
        .wheel-ball.miss-ball{border:3px dashed var(--success)!important;opacity:.65}

        {target:11,correct:[3,7],tip:'紫色与黄橙色、青绿色都是对比色！一暖一冷的搭配富有层次感和艺术气息。'}
    ];

    let currentMode='',currentQuestion=0,score=0,questions=[],selectedOptions=new Set(),isAnswered=false,timerInterval=null,timeLeft=8,currentSvg=null,wheelParams=null;

    function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
    function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type;requestAnimationFrame(()=>t.classList.add('show'));setTimeout(()=>t.classList.remove('show'),2000)}
    function createConfetti(){const c=['#EF4444','#EAB308','#3B82F6','#22C55E','#A855F7','#F97316','#EC4899','#06B6D4'];for(let i=0;i<45;i++){const e=document.createElement('div');e.className='confetti';e.style.left=Math.random()*100+'vw';e.style.background=c[Math.floor(Math.random()*c.length)];e.style.width=(Math.random()*10+5)+'px';e.style.height=(Math.random()*10+5)+'px';e.style.borderRadius=Math.random()>.5?'50%':'2px';e.style.animationDuration=(Math.random()*2+1.5)+'s';e.style.animationDelay=(Math.random()*.5)+'s';document.body.appendChild(e);setTimeout(()=>e.remove(),4000)}}
    function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo({top:0,behavior:'smooth'})}
    function goHome(){clearInterval(timerInterval);showPage('home-page')}
    function getCorrectAll(q){return Array.isArray(q.correct)?[...q.correct]:[q.correct]}

    function getWP(){
        const m=window.innerWidth<640;
        const sz=m?280:350,bs=m?44:54,fs=m?10:12,r=sz/2-bs/2-10;
        return{size:sz,ballSize:bs,fontSize:fs,radius:Math.max(60,r),center:sz/2};
    }

    function ballPos(i,total,radius,cx,cy){
        const a=(i/total)*2*Math.PI-Math.PI/2;
        return{x:cx+radius*Math.cos(a),y:cy+radius*Math.sin(a)};
    }

    function renderWheelQuestion(q,mode){
        const p=getWP();wheelParams=p;
        const area=document.getElementById('wheel-area');
        area.innerHTML='';currentSvg=null;
        const wrap=document.createElement('div');
        wrap.style.cssText=`position:relative;width:${p.size}px;height:${p.size}px;margin:0 auto;`;
        const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
        svg.setAttribute('width',p.size);svg.setAttribute('height',p.size);
        svg.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:10;';
        wrap.appendChild(svg);currentSvg=svg;
        const ring=document.createElement('div');
        ring.style.cssText='position:absolute;inset:0;border-radius:50%;background:conic-gradient(#EF4444,#F97316,#FB923C,#FBBF24,#EAB308,#84CC16,#22C55E,#14B8A6,#06B6D4,#3B82F6,#8B5CF6,#A855F7,#EF4444);padding:5px;opacity:.25;';
        const ri=document.createElement('div');ri.style.cssText='width:100%;height:100%;border-radius:50%;background:var(--bg);';ring.appendChild(ri);
        wrap.appendChild(ring);
        const ctr=document.createElement('div');
        const cSz=p.size*.42;
        ctr.id='wheel-center';
        ctr.style.cssText=`position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:${cSz}px;height:${cSz}px;border-radius:50%;background:var(--card);border:3px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.06);z-index:5;padding:6px;`;
        wrap.appendChild(ctr);
        W.forEach((color,i)=>{
            const pos=ballPos(i,12,p.radius,p.center,p.center);
            const ball=document.createElement('div');
            ball.className='wheel-ball';ball.dataset.index=i;
            ball.setAttribute('role','button');ball.setAttribute('tabindex','0');
            ball.setAttribute('aria-label',color.name+'色');
            ball.style.cssText=`position:absolute;width:${p.ballSize}px;height:${p.ballSize}px;left:${pos.x-p.ballSize/2}px;top:${pos.y-p.ballSize/2}px;background:${color.hex};border-radius:50%;border:3px solid white;cursor:pointer;z-index:8;box-shadow:0 3px 12px rgba(0,0,0,.15),inset 0 -3px 8px rgba(0,0,0,.08),inset 0 3px 8px rgba(255,255,255,.3);animation:bounceSoft .4s ${i*.04}s ease-out both;`;
            const hl=document.createElement('div');
            hl.style.cssText='position:absolute;top:14%;left:18%;width:30%;height:22%;background:radial-gradient(ellipse,rgba(255,255,255,.6),transparent);border-radius:50%;pointer-events:none;';
            ball.appendChild(hl);
            const lb=document.createElement('span');
            lb.style.cssText=`position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:${p.fontSize}px;font-weight:700;color:var(--muted);white-space:nowrap;pointer-events:none;`;
            lb.textContent=color.name;ball.appendChild(lb);
            ball.addEventListener('click',()=>handleWheelClick(i,ball));
            ball.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();handleWheelClick(i,ball)}});
            wrap.appendChild(ball);
        });
        area.appendChild(wrap);
        fillCenter(ctr,q,mode,p);
    }

    function fillCenter(ctr,q,mode,p){
        const bs=p.ballSize*.5;
        if(mode==='primary'){
            if(q.type==='multi'){
                ctr.innerHTML='<i class="fa-solid fa-hand-pointer text-xl mb-1" style="color:var(--accent);"></i><span class="font-bold text-xs" style="color:var(--fg);">选出3个</span>';
            }else{
                const c1=W[q.mixSrc[0]],c2=W[q.mixSrc[1]];
                ctr.innerHTML=`<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;"><div style="width:${bs}px;height:${bs}px;border-radius:50%;background:${c1.hex};border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,.15);animation:mixPulse 2s infinite;"></div><span class="font-cartoon font-bold text-base" style="color:var(--muted);">+</span><div style="width:${bs}px;height:${bs}px;border-radius:50%;background:${c2.hex};border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,.15);animation:mixPulse 2s .4s infinite;"></div></div><div style="width:1.5px;height:6px;background:var(--border);margin:0 auto;"></div><div style="width:${bs}px;height:${bs}px;border-radius:50%;background:var(--border);border:2px dashed var(--muted);display:flex;align-items:center;justify-content:center;"><span class="font-cartoon font-bold" style="color:var(--muted);font-size:${bs*.45}px;">?</span></div>`;
            }
        }else{
            const t=W[q.target];
            ctr.innerHTML=`<div style="width:${bs*1.3}px;height:${bs*1.3}px;border-radius:50%;background:${t.hex};border:3px solid white;box-shadow:0 3px 12px rgba(0,0,0,.2),inset 0 -3px 8px rgba(0,0,0,.1),inset 0 3px 8px rgba(255,255,255,.3);margin-bottom:2px;"></div><span class="font-bold" style="color:var(--muted);font-size:${p.fontSize-1}px;">${t.name}</span>`;
        }
    }

    function handleWheelClick(idx,ball){
        if(isAnswered)return;
        const q=questions[currentQuestion];
        if(q.type==='multi'){
            if(selectedOptions.has(idx)){selectedOptions.delete(idx);ball.classList.remove('selected')}
            else{if(selectedOptions.size>=3)return;selectedOptions.add(idx);ball.classList.add('selected','anim-pop');setTimeout(()=>ball.classList.remove('anim-pop'),300)}
            if(selectedOptions.size===3)setTimeout(confirmAnswer,300);
        }else{
            document.querySelectorAll('.wheel-ball').forEach(b=>b.classList.remove('selected'));
            selectedOptions.clear();selectedOptions.add(idx);
            ball.classList.add('selected','anim-pop');
            setTimeout(()=>ball.classList.remove('anim-pop'),300);
            setTimeout(confirmAnswer,300);
        }
    }

    function confirmAnswer(){
        if(isAnswered)return;isAnswered=true;clearInterval(timerInterval);
        const q=questions[currentQuestion];
        const correctAll=getCorrectAll(q);
        const correctSet=new Set(correctAll);
        let isCorrect;
        if(q.type==='multi'){
            isCorrect=correctAll.length===selectedOptions.size&&correctAll.every(c=>selectedOptions.has(c));
        }else{
            isCorrect=correctSet.has([...selectedOptions][0]);
        }
        document.querySelectorAll('.wheel-ball').forEach(ball=>{
            const idx=parseInt(ball.dataset.index);
            ball.style.cursor='default';ball.style.pointerEvents='none';
            ball.classList.remove('selected');
            if(correctSet.has(idx)){
                ball.classList.add('correct-ball');
            }else if(selectedOptions.has(idx)){
                ball.classList.add('wrong-ball','anim-shake');
            }
            if(q.type==='multi'&&correctSet.has(idx)&&!selectedOptions.has(idx)){
                ball.classList.remove('correct-ball');ball.classList.add('miss-ball');
            }
        });
        drawConnections(q,currentMode);
        if(isCorrect){score+=25;document.getElementById('score-display').textContent=score;showToast('回答正确！+25分','success');createConfetti()}
        else showToast('再想想哦～','error');
        document.getElementById('knowledge-text').textContent=q.tip;
        const kb=document.getElementById('knowledge-box');kb.classList.remove('hidden');kb.classList.add('anim-slide-up');
        document.getElementById('next-btn').classList.remove('hidden');
        const np=((currentQuestion+1)/questions.length)*100;
        document.getElementById('progress-fill').style.width=np+'%';
        document.getElementById('progress-percent').textContent=Math.round(np)+'%';
    }

    function drawLine(i1,i2,color,dash){
        if(!currentSvg||!wheelParams)return;
        const p1=ballPos(i1,12,wheelParams.radius,wheelParams.center,wheelParams.center);
        const p2=ballPos(i2,12,wheelParams.radius,wheelParams.center,wheelParams.center);
        const l=document.createElementNS('http://www.w3.org/2000/svg','line');
        l.setAttribute('x1',p1.x);l.setAttribute('y1',p1.y);l.setAttribute('x2',p2.x);l.setAttribute('y2',p2.y);
        l.setAttribute('stroke',color);l.setAttribute('stroke-width','3');l.setAttribute('stroke-dasharray',dash);l.setAttribute('stroke-linecap','round');l.setAttribute('opacity','0');
        l.style.transition='opacity .6s';currentSvg.appendChild(l);
        requestAnimationFrame(()=>l.setAttribute('opacity','0.7'));
    }

    function drawConnections(q,mode){
        const ca=getCorrectAll(q);
        if(mode==='primary'){
            if(q.type==='multi'){
                for(let i=0;i<ca.length;i++)for(let j=i+1;j<ca.length;j++)drawLine(ca[i],ca[j],'#22C55E','8,4');
            }else{
                drawLine(q.mixSrc[0],ca[0],W[q.mixSrc[0]].hex,'6,4');
                drawLine(q.mixSrc[1],ca[0],W[q.mixSrc[1]].hex,'6,4');
            }
        }else if(mode==='complementary'){
            drawLine(q.target,ca[0],'#EF4444','8,4');
        }else if(mode==='analogous'){
            /* 邻近色不画连线，仅靠绿色描边展示 */
        }else if(mode==='contrast'){
            ca.forEach(c=>drawLine(q.target,c,'#F97316','6,6'));
        }
    }

    function startGame(mode){
        currentMode=mode;currentQuestion=0;score=0;selectedOptions=new Set();isAnswered=false;clearInterval(timerInterval);
        switch(mode){
            case'primary':questions=[...PRIMARY_Q];break;
            case'complementary':questions=shuffle([...COMPLEMENTARY_Q]);break;
            case'analogous':questions=shuffle([...ANALOGOUS_Q]).slice(0,4);break;
            case'contrast':questions=shuffle([...CONTRAST_Q]);break;
        }
        const titles={primary:'三原色混合战',complementary:'互补色配对',analogous:'邻近色小侦探',contrast:'对比色闪电战'};
        const barBg={primary:'linear-gradient(90deg,#EF4444,#EAB308,#3B82F6)',complementary:'linear-gradient(90deg,#EF4444,#22C55E)',analogous:'linear-gradient(90deg,#F97316,#FBBF24)',contrast:'linear-gradient(90deg,#FFB800,#FF6B4A)'};
        document.getElementById('game-title').textContent=titles[mode];
        document.getElementById('timer-container').classList.toggle('hidden',mode!=='contrast');
        document.getElementById('score-display').textContent='0';
        document.getElementById('progress-fill').style.background=barBg[mode];
        document.getElementById('progress-fill').style.width='0%';
        document.getElementById('progress-percent').textContent='0%';
        showPage('game-page');renderQuestion();
    }

    function renderQuestion(){
        if(currentQuestion>=questions.length){showResult();return}
        isAnswered=false;selectedOptions=new Set();clearInterval(timerInterval);
        const q=questions[currentQuestion];
        document.getElementById('progress-text').textContent=`第 ${currentQuestion+1} / ${questions.length} 题`;
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('knowledge-box').classList.add('hidden');
        const tc=document.getElementById('timer-circle'),tt=document.getElementById('timer-text');
        tc.style.stroke='var(--accent)';tc.style.strokeDashoffset='0';tt.style.color='var(--accent)';tt.textContent='8';
        let qText=q.question;
        if(currentMode==='complementary') qText=`找出 <strong style="color:${W[q.target].hex}">${W[q.target].name}</strong> 的互补色`;
        else if(currentMode==='analogous') qText=`找出 <strong style="color:${W[q.target].hex}">${W[q.target].name}</strong> 的一个邻近色`;
        else if(currentMode==='contrast') qText=`快速找出 <strong style="color:${W[q.target].hex}">${W[q.target].name}</strong> 的对比色`;
        document.getElementById('question-text').innerHTML=qText;
        renderWheelQuestion(q,currentMode);
        if(currentMode==='contrast')startTimer();
    }

    function nextQuestion(){currentQuestion++;renderQuestion()}

    function startTimer(){
        timeLeft=8;
        const circ=document.getElementById('timer-circle'),txt=document.getElementById('timer-text');
        const C=2*Math.PI*30;circ.style.strokeDasharray=C;circ.style.strokeDashoffset='0';circ.style.stroke='var(--accent)';txt.style.color='var(--accent)';txt.textContent=timeLeft;
        timerInterval=setInterval(()=>{
            timeLeft--;txt.textContent=Math.max(0,timeLeft);
            circ.style.strokeDashoffset=C*(1-timeLeft/8);
            if(timeLeft<=2){circ.style.stroke='var(--error)';txt.style.color='var(--error)'}
            else if(timeLeft<=4){circ.style.stroke='var(--yellow)';txt.style.color='var(--yellow)'}
            if(timeLeft<=0){
                clearInterval(timerInterval);
                if(!isAnswered){
                    isAnswered=true;showToast('时间到！','error');
                    const q=questions[currentQuestion];
                    const ca=getCorrectAll(q);const cs=new Set(ca);
                    document.querySelectorAll('.wheel-ball').forEach(b=>{
                        const idx=parseInt(b.dataset.index);
                        b.style.cursor='default';b.style.pointerEvents='none';b.classList.remove('selected');
                        if(cs.has(idx))b.classList.add('correct-ball');
                    });
                    drawConnections(q,currentMode);
                    document.getElementById('knowledge-text').textContent=q.tip;
                    const kb=document.getElementById('knowledge-box');kb.classList.remove('hidden');kb.classList.add('anim-slide-up');
                    document.getElementById('next-btn').classList.remove('hidden');
                    const np=((currentQuestion+1)/questions.length)*100;
                    document.getElementById('progress-fill').style.width=np+'%';
                    document.getElementById('progress-percent').textContent=Math.round(np)+'%';
                }
            }
        },1000);
    }

    function showResult(){
        clearInterval(timerInterval);showPage('result-page');
        const maxS=questions.length*25,pct=score/maxS;
        const stars=pct>=.88?3:pct>=.5?2:pct>=.13?1:0;
        const names={primary:'三原色混合战',complementary:'互补色配对',analogous:'邻近色小侦探',contrast:'对比色闪电战'};
        const msgs=['别灰心，色彩世界等你来探索！','有进步，继续加油！','很棒，你已经是色彩小能手了！','太厉害了，你是真正的色彩大师！'];
        let sh='';for(let i=0;i<3;i++) sh+=i<stars?`<span class="star filled" style="animation-delay:${i*.35}s;"><i class="fa-solid fa-star"></i></span>`:`<span class="star"><i class="fa-solid fa-star"></i></span>`;
        document.getElementById('result-content').innerHTML=`
            <div class="anim-bounce-in">
                <div class="w-24 h-24 rounded-full mx-auto mb-6 flex items-center justify-center" style="background:linear-gradient(135deg,var(--accent),var(--yellow));box-shadow:0 10px 40px rgba(255,107,74,.35);"><i class="fa-solid fa-trophy text-white text-4xl"></i></div>
                <h2 class="font-cartoon text-2xl md:text-3xl font-bold mb-2">${names[currentMode]}</h2>
                <p class="text-sm mb-6" style="color:var(--muted);">挑战完成</p>
                <div class="star-rating mb-6">${sh}</div>
                <div class="inline-block px-8 py-4 rounded-3xl mb-4" style="background:var(--card);border:3px solid var(--border);box-shadow:0 8px 30px rgba(0,0,0,.06);">
                    <div class="font-cartoon text-5xl font-bold" style="color:var(--accent);">${score}</div>
                    <div class="text-sm font-bold mt-1" style="color:var(--muted);">/ ${maxS} 分</div>
                </div>
                <p class="text-lg font-bold mb-8">${msgs[stars]}</p>
                <div class="flex flex-col sm:flex-row gap-3 justify-center">
                    <button onclick="startGame('${currentMode}')" class="px-7 py-3 rounded-full font-bold text-white text-base transition-all hover:scale-105 active:scale-95" style="background:var(--accent);box-shadow:0 4px 14px rgba(255,107,74,.3);"><i class="fa-solid fa-rotate-right mr-2"></i>再玩一次</button>
                    <button onclick="goHome()" class="px-7 py-3 rounded-full font-bold text-base transition-all hover:scale-105 active:scale-95" style="background:var(--card);border:2px solid var(--border);color:var(--fg);"><i class="fa-solid fa-house mr-2"></i>返回主页</button>
                </div>
            </div>`;
        if(stars>=2)createConfetti();
    }

    function createBubbles(){
        const c=document.getElementById('bubbles');
        const colors=['#EF4444','#EAB308','#3B82F6','#22C55E','#A855F7','#F97316','#EC4899','#06B6D4'];
        for(let i=0;i<16;i++){const b=document.createElement('div');b.className='bubble';const s=Math.random()*45+15;b.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${Math.random()*16+12}s;animation-delay:${Math.random()*10}s;`;c.appendChild(b)}
    }

    document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement.classList.contains('mode-card'))document.activeElement.click()});
    let resizeTimer;
    window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{if(document.getElementById('game-page').classList.contains('active')&&!isAnswered)renderQuestion()},300)});
    createBubbles();
    </script>


			
		
</body></html>
